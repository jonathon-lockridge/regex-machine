name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token plus the OIDC id-token the deploy step needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/configure-pages@v5
      - run: npm ci
      # Base is derived from the ACTUAL repo name so the SPA's assets resolve
      # under the project subpath (the #1 cause of a blank Pages deployment).
      - name: Build
        run: npx vite build --base=/${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
